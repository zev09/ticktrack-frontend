<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body { margin: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg,#ffffff,#f8c8dc,#e75480); color: #fff; display: flex; flex-direction: column; min-height: 100vh; }
.header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; background: rgba(231,84,128,0.9); backdrop-filter: blur(6px); border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
.header h2 { margin: 0; font-size: 2rem; }
.header button { background: rgba(255,255,255,0.2); border: none; padding: 8px 16px; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; transition: transform .2s; font-size: 1rem; }
.header button:hover { transform: scale(1.1); }
.note-area { flex: 1; padding: 20px; background: rgba(231,84,128,0.5); margin: 12px; border-radius: 16px; backdrop-filter: blur(6px); }
textarea { width: 100%; height: 100%; border: none; outline: none; resize: none; font-size: 24px; font-family: 'Poppins', sans-serif; background: transparent; color: white; line-height: 1.5; }
.toolbar { display: flex; flex-wrap: wrap; justify-content: space-around; background: rgba(231,84,128,0.9); padding: 12px 0; border-radius: 16px; margin: 0 12px 12px 12px; backdrop-filter: blur(12px); box-shadow: 0 5px 15px rgba(0,0,0,0.15); }
.tool-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 4px; flex: 1 1 50px; cursor: pointer; transition: transform .2s; color: white; }
.tool-btn .icon { font-size: 2rem; }
.tool-btn .label { font-size: 0.8rem; margin-top: 2px; white-space: nowrap; }
.tool-btn:hover { transform: scale(1.2); }
.popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #ffffff; padding: 20px; border-radius: 12px; display: none; z-index: 100; width: 90%; max-width: 350px; text-align: center; color: #000; }
.popup input, .popup select { width: 100%; margin: 6px 0; padding: 8px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; }
.popup button { margin-top: 12px; padding: 10px 16px; border: none; border-radius: 8px; background: #e75480; color: white; font-weight: 600; cursor: pointer; font-size: 1rem; }
.popup button:hover { transform: scale(1.05); }
#savedList div { font-size: 1.2rem; text-align: left; padding: 8px; border-bottom: 1px solid #ccc; cursor: pointer; }
@media(max-width:600px){ textarea { font-size:20px; } .tool-btn .icon { font-size:1.7rem; } .tool-btn .label { font-size:0.7rem; } }
</style>
</head>
<body>
<div class="header">
  <button onclick="goBack()">← Back</button>
  <h2>Notes</h2>
  <button onclick="saveNote()">✔</button>
</div>
<div class="note-area">
  <textarea id="note" placeholder="Type here..."></textarea>
</div>
<div class="toolbar">
  <div class="tool-btn" onclick="openFont()"><span class="icon">A</span><span class="label">Font</span></div>
  <div class="tool-btn" onclick="openPaint()"><span class="icon">🎨</span><span class="label">Paint</span></div>
  <div class="tool-btn" onclick="clearNote()"><span class="icon">🗑</span><span class="label">Delete</span></div>
  <div class="tool-btn" onclick="setReminder()"><span class="icon">⏰</span><span class="label">Reminder</span></div>
  <div class="tool-btn" onclick="copyNote()"><span class="icon">📋</span><span class="label">Copy</span></div>
  <div class="tool-btn" onclick="showSavedNotes()"><span class="icon">📝</span><span class="label">Saved</span></div>
  <div class="tool-btn" onclick="analyzeSentiment()"><span class="icon">🔍</span><span class="label">Analyze</span></div>
</div>
<div class="popup" id="fontPopup">
  <select onchange="setFont(this.value)">
    <option value="Poppins">Poppins</option>
    <option value="Arial">Arial</option>
    <option value="Courier New">Courier</option>
    <option value="Georgia">Georgia</option>
    <option value="Verdana">Verdana</option>
  </select>
  <input type="number" placeholder="Font size" onchange="setFontSize(this.value)">
  <button onclick="toggleBold()">Bold</button>
  <button onclick="closePopups()">Close</button>
</div>
<div class="popup" id="paintPopup">
  <label>Background</label>
  <input type="color" onchange="setBg(this.value)">
  <label>Text</label>
  <input type="color" onchange="setColor(this.value)">
  <button onclick="closePopups()">Close</button>
</div>
<div class="popup" id="savedPopup">
  <h3>Saved Notes</h3>
  <div id="savedList" style="max-height:300px;overflow-y:auto;"></div>
  <button onclick="closePopups()">Close</button>
</div>
 
<script>
const note = document.getElementById("note");
const noteArea = document.querySelector(".note-area");
const token = localStorage.getItem("token");
if (!token) { alert("No user logged in."); window.location.href = "login.html"; }
const currentUserId = localStorage.getItem("userId");
note.style.fontFamily = localStorage.getItem("font_" + currentUserId) || "Poppins";
note.style.fontSize = localStorage.getItem("size_" + currentUserId) || "24px";
note.style.color = localStorage.getItem("color_" + currentUserId) || "white";
noteArea.style.background = localStorage.getItem("bg_" + currentUserId) || "rgba(231,84,128,0.5)";
 
// ===== SAVE NOTE + UPDATE ACHIEVEMENTS =====
async function saveNote() {
  const content = note.value.trim();
  if (!content) return alert("Cannot save empty note");
  try {
    const res = await fetch("http://localhost:5000/api/notes", {
      method: "POST",
      headers: { "Content-Type": "application/json","Authorization": "Bearer "+token },
      body: JSON.stringify({ text: content })
    });
    if(res.ok){
      alert("✅ Note Saved");
      note.value="";
      loadSavedNotes();
      await fetch("http://localhost:5000/api/achievements/update", {
        method: "POST",
        headers: { "Content-Type": "application/json","Authorization": "Bearer "+token },
        body: JSON.stringify({ key:"notes", increment:1 })
      });
    } else { alert("Save failed"); }
  } catch(err){ console.error(err); alert("Server error"); }
}
 
async function loadSavedNotes() {
  try {
    const res = await fetch("http://localhost:5000/api/notes", { headers:{ "Authorization": "Bearer "+token } });
    if(!res.ok) return;
    const notes = await res.json();
    const list = document.getElementById("savedList");
    list.innerHTML = "";
    if(!notes.length){ list.innerHTML="<i>No saved notes</i>"; return; }
    notes.forEach(n=>{
      const div=document.createElement("div");
      div.textContent = n.text.substring(0,200);
      div.onclick=()=>{ note.value=n.text; closePopups(); };
      list.appendChild(div);
    });
  } catch(err){ console.error(err); }
}
 
// UI
function showSavedNotes(){ loadSavedNotes(); document.getElementById("savedPopup").style.display="block"; }
function clearNote(){ if(confirm("Clear note?")) note.value=""; }
function openFont(){ document.getElementById("fontPopup").style.display="block"; }
function setFont(f){ note.style.fontFamily=f; localStorage.setItem("font_"+currentUserId,f); }
function setFontSize(s){ note.style.fontSize=s+"px"; localStorage.setItem("size_"+currentUserId,s+"px"); }
function toggleBold(){ note.style.fontWeight = note.style.fontWeight==="bold"?"normal":"bold"; }
function openPaint(){ document.getElementById("paintPopup").style.display="block"; }
function setBg(c){ noteArea.style.background=c; localStorage.setItem("bg_"+currentUserId,c); }
function setColor(c){ note.style.color=c; localStorage.setItem("color_"+currentUserId,c); }
function setReminder(){ const mins=prompt("Remind after how many minutes?"); if(mins) setTimeout(()=>alert("⏰ Reminder: "+note.value.substring(0,50)),mins*60000); }
function copyNote(){ navigator.clipboard.writeText(note.value); alert("Copied!"); }
function analyzeSentiment(){ 
  const text = note.value.toLowerCase(); 
  let sentiment="Neutral"; 
  if(/happy|joy|love|excited/.test(text)) sentiment="😊 Happy"; 
  else if(/sad|angry|upset|hate/.test(text)) sentiment="😢 Sad"; 
  else if(/stressed|tired|overwhelmed/.test(text)) sentiment="😰 Stressed"; 
  alert("Sentiment: "+sentiment);
}
function closePopups(){ document.querySelectorAll(".popup").forEach(p=>p.style.display="none"); }
function goBack(){ window.location.href="homepage1.html"; }
loadSavedNotes();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TickTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

/* SAME PINK GRADIENT STYLE */

background: linear-gradient(
135deg,
#fff5f7,
#ffd6e0,
#ffb6c9
);

overflow:hidden;

}

/* TITLE DESIGN */

.title{

font-size:72px;
font-weight:700;
letter-spacing:4px;

background: linear-gradient(90deg,#ff6f91,#ff9aa2);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

text-shadow:0 10px 30px rgba(255,120,150,0.3);

margin-bottom:15px;

}

/* SUBTITLE */

.subtitle{

font-size:20px;
color:#555;
font-weight:400;
margin-bottom:70px;

}

/* CONTINUE BUTTON */

.continue-btn{

display:flex;
align-items:center;
gap:10px;

text-decoration:none;
font-weight:600;
font-size:17px;
color:#444;

position:absolute;
bottom:40px;
right:40px;

transition:transform .2s ease;

}

.continue-btn img{

width:35px;
height:35px;
border-radius:50%;

}

.continue-btn:hover{

transform:scale(1.1);

}

/* SMALL DECORATION CIRCLES */

.circle{

position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.35);
backdrop-filter:blur(10px);

}

.circle1{
width:220px;
height:220px;
top:-60px;
left:-60px;
}

.circle2{
width:180px;
height:180px;
bottom:-50px;
right:-50px;
}

.circle3{
width:120px;
height:120px;
bottom:120px;
left:120px;
}

/* RESPONSIVE */

@media(max-width:768px){

.title{
font-size:48px;
}

.subtitle{
font-size:16px;
padding:0 20px;
}

}

</style>
</head>

<body>

<div class="circle circle1"></div>
<div class="circle circle2"></div>
<div class="circle circle3"></div>

<div class="title">TickTrack</div>

<div class="subtitle">
Track and Live a Healthy Lifestyle
</div>

<a href="login.html" class="continue-btn">
CONTINUE
<img src="R.png">
</a>

</body>
</html>
